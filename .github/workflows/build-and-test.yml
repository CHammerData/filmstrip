name: Build and Test

on:
  workflow_call:

env:
  # Prisma's schema references env("DATABASE_URL"); generate/typecheck need it set
  # even though CI never opens a real DB (tests mock the Prisma client).
  DATABASE_URL: "file:./ci.db"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm run test:unit
        env:
          CI: true

  web-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      # `npm run build` is `tsc --noEmit && vite build`, so this both type-checks
      # the React app and confirms the production bundle compiles.
      - name: Type check and build web
        run: npm run build
        working-directory: web
