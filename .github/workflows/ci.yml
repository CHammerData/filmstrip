name: CI

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'feature/**'
      - 'defect/**'
      - 'fix/**'
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    permissions:
      contents: read
    uses: ./.github/workflows/build-and-test.yml
    secrets: inherit

  # Image build/push happens on release, not here — see docker.yml.
