name: CI

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'feature/**'
      - 'defect/**'
      - 'fix/**'
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    permissions:
      contents: read
    uses: ./.github/workflows/build-and-test.yml
    secrets: inherit

  # Docker build/push is intentionally disabled until M5 (see docker.yml).
