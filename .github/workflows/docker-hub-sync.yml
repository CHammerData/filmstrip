name: Sync README to Docker Hub

# Pushes README.md to the Docker Hub repo's description. Runs after a release (so the published
# image's docs stay current) and on demand. Requires the same Docker Hub config as docker.yml:
# DOCKERHUB_NAMESPACE (variable), DOCKERHUB_USERNAME / DOCKERHUB_TOKEN (secrets).
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  update-docker-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Docker Hub Description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ vars.DOCKERHUB_NAMESPACE }}/filmstrip
          readme-filepath: ./README.md
          short-description: ${{ github.event.repository.description }}
