name: Docker Build and Push

# Publishes the single-container image to Docker Hub.
#
# Trigger: publishing a GitHub Release (tag vX.Y.Z) — that is the release flow. Also runnable
# manually (workflow_dispatch) for a one-off build/push from the current ref.
#
# Required repo config before this can push (see README "Publishing"):
#   - Variable  DOCKERHUB_NAMESPACE  — your Docker Hub user/org (image = <namespace>/filmstrip)
#   - Secret    DOCKERHUB_USERNAME   — Docker Hub login
#   - Secret    DOCKERHUB_TOKEN      — Docker Hub access token (write scope)
on:
  release:
    types: [published]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ vars.DOCKERHUB_NAMESPACE }}/filmstrip

jobs:
  # Guard against tag/package.json drift: a vX.Y.Z release must match package.json's version.
  # Only meaningful on release; skipped for manual dispatch.
  version-check:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "release tag=$TAG  package.json=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Release tag ($TAG) does not match package.json version ($PKG). Bump package.json first."
            exit 1
          fi

  docker:
    needs: version-check
    # needs.version-check is skipped on manual dispatch; allow the job to run anyway.
    if: always() && (github.event_name != 'release' || needs.version-check.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          # {{version}} etc. strip the leading v from the git tag (v0.2.0 -> 0.2.0), the Docker
          # tag convention. latest only on a real release.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # FILMSTRIP_VERSION is left unset: version.ts falls back to package.json, which the
          # version-check job has already confirmed matches the release tag (no leading-v mismatch).
          build-args: |
            FILMSTRIP_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
